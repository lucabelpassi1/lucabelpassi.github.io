  <div class="site-wrap">
    <main id="main">

      <section class="contact-wrap contact-center fade-in-up">

        <div class="contact-intro">
          <span class="meta-label">General Inquiries</span>
          <h1 class="editorial-headline">
            Interested in a collaboration, a print, or simply want to say hello?
          </h1>
        </div>

        <div class="contact-action">
          <!-- "Email the Studio" → hai 22 anni e lavori da solo. "Write to me" è più forte
               perché è vero, e stona meno con la sincerità delle foto. -->
          <a href="mailto:studio@lucabelpassi.com" class="action-link">
            Write to me
          </a>

          <!-- L'indirizzo IN CHIARO: i mailto hanno conversione pessima
               (mobile senza client configurato = non succede niente).
               Chi usa Gmail nel browser lo copia e basta. -->
          <p class="contact-email">
            <a href="mailto:studio@lucabelpassi.com">studio@lucabelpassi.com</a>
          </p>
        </div>

        <div class="contact-meta">
          <div class="meta-item">
            <span class="meta-label">Base</span>
            <!-- "Italy / Worldwide" non dice niente. Chi cerca un fotografo cerca DOVE sei. -->
            <p>Pistoia, Tuscany</p>
          </div>
          <div class="meta-item">
            <span class="meta-label">Connect</span>
            <a href="https://instagram.com/lucabelpassi" target="_blank" rel="noopener" class="meta-link">Instagram</a>
          </div>
        </div>

        <!-- La pagina era vuota per tre quarti di schermo: sembra un sito abbandonato.
             Tre miniature che rimandano a Works la chiudono e riportano l'occhio sulle foto. -->
        <div class="contact-gallery">
          <a href="works.html"><img src="img/people/vincenzo-1200.webp" alt="Riflesso nello specchio di una donna che prova una montatura cat-eye bianca." loading="lazy" decoding="async"></a>
          <a href="works.html"><img src="img/people/dianametal-1200.webp" alt="Uomo alla guida di un'auto con occhiali da sole dalla montatura trasparente." loading="lazy" decoding="async"></a>
          <a href="works.html"><img src="img/people/patrickcaffe-1200.webp" alt="Donna con giacca argentata e occhiali da sole cat-eye sotto ombre di foglie." loading="lazy" decoding="async"></a>
        </div>

      </section>

    </main>
